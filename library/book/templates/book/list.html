<h1>Books</h1>

<form method="get">

    <input
        type="text"
        name="title"
        placeholder="Search by title"
    >

    <input
        type="text"
        name="author"
        placeholder="Search by author"
    >

    <button type="submit">
        Search
    </button>

</form>

<hr>

{% for book in books %}

<div>

    <h3>
        <a href="{% url 'book_detail' book.id %}">
            {{ book.name }}
        </a>
    </h3>

    <p>
        Available copies: {{ book.count }}
    </p>

</div>

{% empty %}

<p>No books found.</p>

{% endfor %}
