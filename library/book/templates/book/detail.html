<h1>{{ book.name }}</h1>

<p>
    {{ book.description }}
</p>

<p>
    Available copies: {{ book.count }}
</p>

<h3>Authors</h3>

<ul>

{% for author in book.authors.all %}

    <li>
        {{ author.name }}
    </li>

{% endfor %}

</ul>

<form
    method="post"
    action="{% url 'create_order' book.id %}"
>

    {% csrf_token %}

    <button type="submit">
        Borrow Book
    </button>

</form>
