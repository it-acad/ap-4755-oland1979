<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Видалити автора</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f9f9f9; }
        .confirm-container { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .btn-danger { background: #dc3545; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .btn-secondary { background: #6c757d; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-size: 16px; margin-left: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="confirm-container">
    <h2>Підтвердження видалення</h2>
    <p>Ви впевнені, що хочете видалити автора <strong>{{ author.surname }} {{ author.name }}</strong> з бази даних?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Так, видалити</button>
        <a href="{% url 'authors_list' %}" class="btn-secondary">Скасувати</a>
    </form>
</div>

</body>
</html>
