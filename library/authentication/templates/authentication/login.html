<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід у систему</title>
</head>
<body>
    <h2>Авторизація користувача</h2>

    {% if error %}
        <p style="color: red; font-weight: bold;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label for="email">Логін або Email:</label><br>
            <input type="text" id="email" name="email" required placeholder="Введіть логін або email">
        </p>

        <p>
            <label for="password">Пароль:</label><br>
            <input type="password" id="password" name="password" required placeholder="Введіть пароль">
        </p>

        <button type="submit">Увійти</button>
    </form>

    <p>Ще не зареєстровані? <a href="/auth/register/">Створити акаунт</a></p>
</body>
</html>
