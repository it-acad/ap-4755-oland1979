<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
</head>
<body>
    <h2>Реєстрація нового користувача</h2>

    {% if error %}
        <p style="color: red; font-weight: bold;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label for="email">Email (Обов'язково):</label><br>
            <input type="email" id="email" name="email" required placeholder="example@mail.com">
        </p>

        <p>
            <label for="password">Пароль (Обов'язково):</label><br>
            <input type="password" id="password" name="password" required placeholder="Введіть пароль">
        </p>

        <p>
            <label for="first_name">Ім'я:</label><br>
            <input type="text" id="first_name" name="first_name" placeholder="Ваше ім'я">
        </p>

        <p>
            <label for="last_name">Прізвище:</label><br>
            <input type="text" id="last_name" name="last_name" placeholder="Ваше прізвище">
        </p>

        <p>
            <label for="role">Оберіть роль у системі:</label><br>
            <select id="role" name="role">
                <option value="0">Звичайний користувач (Гість)</option>
                <option value="1">Бібліотекар (Адміністратор)</option>
            </select>
        </p>

        <button type="submit">Зареєструватися</button>
    </form>

    <p>Вже маєте акаунт? <a href="/auth/login/">Увійти</a></p>
</body>
</html>
